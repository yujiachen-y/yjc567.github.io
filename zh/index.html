<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Jiachen Yu</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<link rel="canonical" href="/blog/zh/" />
<meta http-equiv="refresh" content="0; url=/blog/zh/" />
<style>body{margin:0;font:14px system-ui,sans-serif;color:#666;background:#fafaf7;display:flex;align-items:center;justify-content:center;min-height:100vh}</style>
</head>
<body>
<p>Redirecting to <a href="/blog/zh/">/blog/zh/</a>…</p>
<script>(function(){
  try {
    var stored = localStorage.getItem('gen-blog-lang');
    var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    var prefers = stored || (nav.indexOf('zh') === 0 ? 'zh' : 'en');
    var here = window.location.pathname.replace(/index\.html$/, '');
    var target = '/blog/zh/';
    if (here === '/') {
      target = prefers === 'zh' ? '/zh/blog/' : '/blog/';
    }
    window.location.replace(target);
  } catch (e) {
    window.location.replace('/blog/zh/');
  }
})();</script>
</body>
</html>
